<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排泄行動性格分析研究所</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  background:linear-gradient(180deg,#2a1a10,#4b2e1e,#1a0f0a);
  color:#fff;
  text-align:center;
}

header{
  padding:40px 20px 10px;
}

h1{
  font-size:38px;
  font-weight:900;
  letter-spacing:4px;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

button{
  width:100%;
  padding:18px;
  margin:10px 0;
  font-size:18px;
  font-weight:700;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#6b3e26;
  color:#fff;
  transition:0.2s;
}

button:hover{
  background:#8a5436;
}

.progress{
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin:20px 0;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#c97a42;
  transition:0.3s;
}

#loading{
  font-size:18px;
  line-height:1.8;
}

.result-card{
  padding:30px;
  background:#2e1c13;
  border-radius:20px;
  margin-top:20px;
}

.type-name{
  font-size:28px;
  font-weight:900;
  margin-bottom:10px;
}

.metric{
  margin:10px 0;
  text-align:left;
}

.metric-bar{
  height:8px;
  background:#444;
  border-radius:10px;
  overflow:hidden;
}

.metric-fill{
  height:100%;
  background:#c97a42;
}
.share-btn{
  margin-top:20px;
  background:#a65d2d;
}
</style>
</head>

<body>

<header>
<h1>排泄行動性格分析研究所</h1>
</header>

<div class="container">

<div id="quiz">
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<h2 id="question"></h2>
<div id="answers"></div>
</div>

<div id="loading" style="display:none;"></div>

<div id="result" style="display:none;">
<div class="result-card" id="resultCard">
<div class="type-name" id="typeName"></div>
<p id="typeDesc"></p>
<p id="typeUnrelated"></p>
<p id="typeDark"></p>

<div class="metric">社会適応指数
<div class="metric-bar"><div class="metric-fill" id="m1"></div></div>
</div>

<div class="metric">内的独裁度
<div class="metric-bar"><div class="metric-fill" id="m2"></div></div>
</div>

<div class="metric">思考分岐回数
<div class="metric-bar"><div class="metric-fill" id="m3"></div></div>
</div>

<p id="compatibility"></p>
</div>

<button class="share-btn" onclick="shareResult()">結果を画像保存</button>
</div>

</div>

<script>

const questions = [
"個室に入った瞬間どうする？",
"トイレットペーパーの残量は？",
"音が気になったら？",
"退出タイミングは？",
"並んでいたら？",
"ドアの鍵を閉めた後？",
"床が濡れていたら？",
"誰かが待っていそうな気配を感じたら？",
"個室の匂いが強いとき？",
"トイレが空いていないとき？",
"紙が切れたら？",
"退出後すぐ何を考える？",
"音姫があったら？",
"洗面所で知人に会ったら？",
"最後に振り返る？"
];

const options = [
["まず観察","すぐ行動","配置を確認","音を確認"],
["必ず確認","気にしない","多めに使う","少量で済ます"],
["気配を消す","気にしない","理論的に分析","諦める"],
["即退出","様子を見る","完璧なタイミング","堂々と出る"]
];

let current=0;
let score=0;

function loadQuestion(){
document.getElementById("question").innerText=
`質問 ${current+1} / 15\n${questions[current]}`;

let ans=document.getElementById("answers");
ans.innerHTML="";
options[current%4].forEach((opt,i)=>{
let btn=document.createElement("button");
btn.innerText=opt;
btn.onclick=()=>next(i);
ans.appendChild(btn);
});

document.getElementById("progressBar").style.width=
((current)/questions.length)*100+"%";
}

function next(val){
score+=val;
current++;
if(current<questions.length){
loadQuestion();
}else{
showLoading();
}
}

function showLoading(){
document.getElementById("quiz").style.display="none";
let load=document.getElementById("loading");
load.style.display="block";
load.innerHTML="被験者の思考回路を再構築中...<br>逸脱傾向を測定...<br>人類データベースと照合中...";
setTimeout(showResult,2500);
}

const TYPES=[
{
name:"静寂観測型",
desc:"あなたは環境を観測してから動きます。それは遅さではなく構造理解です。",
un:"あなたはパン派です。しかも2分30秒で止めます。",
dark:"中学時代、一度は合理とは何かを考えました。",
m:[72,41,88],
worst:"瞬間判断合理型"
},
{
name:"爆速撤退型合理主義者",
desc:"あなたは崩壊を察知する嗅覚が鋭い。撤退は最適化です。",
un:"集合写真では端に立ちます。",
dark:"既読をつけて30分放置します。",
m:[64,55,67],
worst:"構造的反抗者"
},
{
name:"思考暴走理論家",
desc:"あなたは考えすぎます。そして誇っています。",
un:"パン屋で20分悩みます。",
dark:"考察ノートを作りました。",
m:[61,36,95],
worst:"瞬間判断合理型"
},
{
name:"無言の支配構造型",
desc:"あなたは静かに主導権を握ります。",
un:"なぜかあなたの意見は通ります。",
dark:"人間関係を図で整理しました。",
m:[83,82,60],
worst:"偽冷静保持者"
}
];

function showResult(){
document.getElementById("loading").style.display="none";
document.getElementById("result").style.display="block";

let type=TYPES[score%TYPES.length];

document.getElementById("typeName").innerText=type.name;
document.getElementById("typeDesc").innerText=type.desc;
document.getElementById("typeUnrelated").innerText=type.un;
document.getElementById("typeDark").innerText=type.dark;
document.getElementById("compatibility").innerText=
"相性最悪タイプ："+type.worst;

document.getElementById("m1").style.width=type.m[0]+"%";
document.getElementById("m2").style.width=type.m[1]+"%";
document.getElementById("m3").style.width=type.m[2]+"%";
}

function shareResult(){
html2canvas(document.querySelector("#resultCard")).then(canvas=>{
let link=document.createElement("a");
link.download="analysis.png";
link.href=canvas.toDataURL();
link.click();
});
}

loadQuestion();

</script>

</body>
</html>
