<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>排泄行動性格分析研究所</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* 🔥 上部タイトル */
.header{
  text-align:center;
  padding:30px 20px;
  font-size:34px;
  font-weight:900;
  letter-spacing:3px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.section{
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}

.hidden{display:none;}

.progress{
  margin-bottom:20px;
  opacity:0.7;
}

.bar{
  height:8px;
  background:#ffffff33;
  border-radius:10px;
  margin-top:10px;
}

.fill{
  height:8px;
  background:white;
  border-radius:10px;
  width:0%;
  transition:0.3s;
}

.question{
  font-size:24px;
  margin:40px 0;
}

.option{
  display:block;
  width:100%;
  margin:20px 0;
  padding:25px 30px;
  border-radius:20px;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:white;
  color:#1c1c1c;
  transition:0.25s;
}

.option:hover{
  transform:scale(1.02);
}

.result{
  background:white;
  color:#243b55;
  padding:50px;
  border-radius:20px;
}

.type{
  font-size:42px;
  font-weight:900;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div class="header">
  排泄行動性格分析研究所
</div>

<div class="section" id="quiz">
  <div class="progress">
    <div id="progressText"></div>
    <div class="bar"><div class="fill" id="progressFill"></div></div>
  </div>
  <div class="question" id="questionText"></div>
  <div id="options"></div>
</div>

<div class="section hidden" id="resultSection">
  <div class="result">
    <div class="type" id="typeText"></div>
    <div id="descText"></div>
  </div>
</div>

<script>

const questions = [
{ text:"個室に入った瞬間、最初にすることは？",
  options:[
  {text:"すぐ座る",type:"T"},
  {text:"鍵を二回確認",type:"S"},
  {text:"スマホ確認",type:"C"},
  {text:"便座チェック",type:"R"}]},
{ text:"滞在時間は？",
  options:[
  {text:"最短",type:"T"},
  {text:"平均",type:"R"},
  {text:"長め",type:"C"},
  {text:"状況次第",type:"S"}]},
{ text:"物音がしたら？",
  options:[
  {text:"気にしない",type:"T"},
  {text:"警戒",type:"S"},
  {text:"停止",type:"C"},
  {text:"分析",type:"R"}]},
{ text:"列ができていたら？",
  options:[
  {text:"無視",type:"T"},
  {text:"焦る",type:"E"},
  {text:"冷静",type:"R"},
  {text:"慎重",type:"S"}]},
{ text:"トラブル時は？",
  options:[
  {text:"即対応",type:"T"},
  {text:"共感優先",type:"E"},
  {text:"論理優先",type:"R"},
  {text:"様子見",type:"S"}]},
{ text:"あなたは？",
  options:[
  {text:"合理主義",type:"R"},
  {text:"感情派",type:"E"},
  {text:"主導型",type:"A"},
  {text:"受動型",type:"P"}]},
{ text:"一人時間は？",
  options:[
  {text:"必須",type:"C"},
  {text:"不要",type:"O"},
  {text:"まあ必要",type:"S"},
  {text:"時々",type:"P"}]},
{ text:"決断は？",
  options:[
  {text:"即決",type:"T"},
  {text:"熟考",type:"S"},
  {text:"直感",type:"E"},
  {text:"分析",type:"R"}]},
{ text:"休日は？",
  options:[
  {text:"外出",type:"O"},
  {text:"家",type:"C"},
  {text:"計画的",type:"R"},
  {text:"衝動的",type:"E"}]},
{ text:"人間関係は？",
  options:[
  {text:"主導",type:"A"},
  {text:"合わせる",type:"P"},
  {text:"観察",type:"C"},
  {text:"盛り上げ",type:"O"}]},
{ text:"プレッシャー下では？",
  options:[
  {text:"加速",type:"T"},
  {text:"緊張",type:"E"},
  {text:"分析",type:"R"},
  {text:"慎重",type:"S"}]},
{ text:"整理整頓は？",
  options:[
  {text:"完璧",type:"R"},
  {text:"気分次第",type:"E"},
  {text:"最低限",type:"T"},
  {text:"無頓着",type:"P"}]},
{ text:"集団では？",
  options:[
  {text:"目立つ",type:"O"},
  {text:"静か",type:"C"},
  {text:"仕切る",type:"A"},
  {text:"流れる",type:"P"}]},
{ text:"安心するのは？",
  options:[
  {text:"一人",type:"C"},
  {text:"仲間",type:"O"},
  {text:"計画",type:"R"},
  {text:"感情共有",type:"E"}]},
{ text:"最も近いのは？",
  options:[
  {text:"即断",type:"T"},
  {text:"慎重",type:"S"},
  {text:"主導",type:"A"},
  {text:"内省",type:"C"}]}
];

let index=0;
let scores={T:0,S:0,R:0,E:0,A:0,P:0,C:0,O:0};

function showQuestion(){
document.getElementById("progressText").innerText=
`質問 ${index+1} / ${questions.length}`;
document.getElementById("progressFill").style.width=
(index/questions.length)*100+"%";

const q=questions[index];
document.getElementById("questionText").innerText=q.text;

const optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach(opt=>{
const btn=document.createElement("button");
btn.className="option";
btn.innerText=opt.text;
btn.onclick=()=>answer(opt.type);
optionsDiv.appendChild(btn);
});
}

function answer(type){
scores[type]++;
index++;
if(index<questions.length){
showQuestion();
}else{
showResult();
}
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultSection").classList.remove("hidden");

const type=
(scores.T>=scores.S?"T":"S")+
(scores.R>=scores.E?"R":"E")+
(scores.A>=scores.P?"A":"P")+
(scores.C>=scores.O?"C":"O");

const descriptions={
"TRAC":"あなたは完全合理支配型。パン派で朝は絶対トースト。LINEの返信は平均3分以内。",
"TSAC":"あなたは慎重統率型。実はシリアル派。新商品を見ると必ず裏面の成分表を読むタイプ。",
"SRPC":"あなたは超内省調整型。カフェでは必ず端の席。無意識に観葉植物を育て始めます。",
"TRPO":"あなたは衝動外交型。突然海外旅行を予約しがち。だいたいクロワッサン派。"
};

document.getElementById("typeText").innerText=type;

document.getElementById("descText").innerText=
descriptions[type] || 
"あなたは独特すぎる希少タイプ。おそらくパンより米派ですが、実は深夜にアイスを食べる傾向があります。";
}

showQuestion();

</script>
</body>
</html>
