<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>E.P.P.T 排泄姿勢心理研究所</title>

<!-- 画像化ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  margin:0;
  padding:20px;
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#5a3e2b,#2a1a12,#7a4a2a);
  background-size:400% 400%;
  animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

h1{
  text-shadow:0 0 15px #000;
  letter-spacing:3px;
}

.question{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

button{
  padding:12px 25px;
  margin-top:20px;
  border:none;
  border-radius:8px;
  background:#d2a679;
  cursor:pointer;
  font-size:16px;
}

button:hover{opacity:0.8;}

.result{
  margin-top:40px;
}

#resultCard{
  padding:30px;
  border-radius:20px;
  background:linear-gradient(135deg,#2b160c,#5c3a21);
}
</style>
</head>
<body>

<h1>排泄姿勢心理研究所<br>E.P.P.T診断</h1>

<form id="quiz"></form>
<button onclick="calculate()">診断する</button>

<div class="result" id="result"></div>

<script>

const types={
"空間支配者":0,
"完全統制者":0,
"瞬間処理者":0,
"外界遮断者":0,
"過敏感応者":0,
"回避内省者":0,
"静観分析者":0,
"解放自然体":0
};

const descriptions={
"空間支配者":{
text:"空間を制圧する強メンタル型。決断力が高くリーダー適性あり。圧があると言われがちだが成功確率は高い。"
},
"完全統制者":{
text:"全てを管理したい完璧主義者。信頼されやすいが自分にも他人にも厳しい。"
},
"瞬間処理者":{
text:"爆速実行型。迷う前に動く。衝動的だがチャンスを掴む力がある。"
},
"外界遮断者":{
text:"一人の世界を作る没頭型。創造性が高く集中力に優れる。"
},
"過敏感応者":{
text:"空気を読む達人。気遣いができるがストレスを溜めやすい。"
},
"回避内省者":{
text:"思考潜行型。内面が豊かで哲学的。現実から一時距離を取る。"
},
"静観分析者":{
text:"冷静で合理的。感情より論理を優先する安定タイプ。"
},
"解放自然体":{
text:"自由人。ストレス耐性が高くマイペース。"
}
};

const questions=[
["基本姿勢は？",["前傾で集中","完全統制者"],["すぐ終わらせる","瞬間処理者"],["もたれてリラックス","解放自然体"],["周囲を気にする","過敏感応者"]],
["滞在時間は？",["1〜2分","瞬間処理者"],["3〜5分","静観分析者"],["5〜10分","回避内省者"],["長い","外界遮断者"]],
["音は気になる？",["非常に","過敏感応者"],["少し","静観分析者"],["気にしない","空間支配者"],["全く","解放自然体"]],
["スマホは？",["持ち込まない","完全統制者"],["少し見る","静観分析者"],["必ず持ち込む","回避内省者"],["触らない","空間支配者"]],
["公共トイレは？",["避けたい","過敏感応者"],["仕方なく","回避内省者"],["どこでもOK","空間支配者"],["早く出たい","瞬間処理者"]],
["便座温度は？",["必ず確認","完全統制者"],["少し気にする","静観分析者"],["気にしない","解放自然体"],["急いで座る","瞬間処理者"]],
["トイレは？",["作業空間","外界遮断者"],["解放空間","解放自然体"],["任務空間","完全統制者"],["戦場","空間支配者"]],
["終わった後は？",["すぐ出る","瞬間処理者"],["身だしなみ確認","過敏感応者"],["少し余韻","回避内省者"],["特に何もない","空間支配者"]]
];

const form=document.getElementById("quiz");

questions.forEach((q,i)=>{
const div=document.createElement("div");
div.className="question";
div.innerHTML="<p>"+(i+1)+". "+q[0]+"</p>";
q.slice(1).forEach(opt=>{
div.innerHTML+=`<label><input type="radio" name="q${i}" value="${opt[1]}"> ${opt[0]}</label><br>`;
});
form.appendChild(div);
});

function calculate(){
document.getElementById("result").innerHTML="<h2>🔬研究中...</h2><p>排泄姿勢データを解析しています...</p>";

setTimeout(()=>{
Object.keys(types).forEach(k=>types[k]=0);

for(let i=0;i<questions.length;i++){
const selected=document.querySelector(`input[name="q${i}"]:checked`);
if(selected){types[selected.value]++;}
}

let result=Object.keys(types).reduce((a,b)=>types[a]>types[b]?a:b);
const info=descriptions[result];

document.getElementById("result").innerHTML=
`<div id="resultCard">
<h2>${result}</h2>
<p>${info.text}</p>
<p style="font-size:12px;">※本理論は実証研究に基づいていません。</p>
</div>
<button onclick="downloadImage()">画像保存</button>
<button onclick="shareResult('${result}')">Xで共有</button>`;
},2000);
}

function downloadImage(){
html2canvas(document.getElementById("resultCard")).then(canvas=>{
const link=document.createElement("a");
link.download="eptt_result.png";
link.href=canvas.toDataURL();
link.click();
});
}

function shareResult(type){
const text=`私は「${type}」タイプでした。`;
const url=window.location.href;
window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,"_blank");
}

</script>
</body>
</html>
