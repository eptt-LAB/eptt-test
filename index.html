<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>排泄行動性格分析研究所</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden;
}

/* ヒーロー */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 2px;
}

.hero p {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0.8;
}

.start-btn {
  margin-top: 40px;
  padding: 15px 40px;
  font-size: 18px;
  border-radius: 50px;
  border: none;
  background: white;
  color: #2c5364;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.start-btn:hover {
  transform: scale(1.05);
}

/* セクション */
.section {
  padding: 80px 20px;
  text-align: center;
  display: none;
}

.question {
  font-size: 24px;
  margin-bottom: 30px;
}

.option {
  display: block;
  margin: 15px auto;
  padding: 12px 30px;
  width: 300px;
  border-radius: 30px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  background: white;
  color: #2c5364;
}

/* ローディング */
.loading {
  font-size: 20px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.3; }
  50% { opacity: 1; }
  100% { opacity: 0.3; }
}

/* 結果カード */
.result-card {
  background: white;
  color: #2c5364;
  border-radius: 20px;
  padding: 50px;
  max-width: 600px;
  margin: 0 auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease;
}

.result-type {
  font-size: 40px;
  font-weight: 900;
}

.result-desc {
  margin-top: 20px;
  font-family: 'Noto Serif JP', serif;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

.footer {
  text-align: center;
  padding: 40px;
  font-size: 14px;
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="hero" id="hero">
  <h1>排泄行動性格分析研究所</h1>
  <p>あなたの“個室内行動”から本質的性格を解析します。</p>
  <button class="start-btn" onclick="startTest()">診断を始める</button>
</div>

<div class="section" id="questionSection">
  <div class="question">個室に入ったら最初に何をしますか？</div>
  <button class="option" onclick="analyze()">① すぐ座る</button>
  <button class="option" onclick="analyze()">② 音姫を確認する</button>
  <button class="option" onclick="analyze()">③ スマホを構える</button>
</div>

<div class="section" id="loadingSection">
  <div class="loading">
    研究中…<br>
    精神構造を解析しています…
  </div>
</div>

<div class="section" id="resultSection">
  <div class="result-card">
    <div class="result-type">TSR-A</div>
    <div class="result-desc">
      あなたは慎重型個室支配者。<br>
      周囲の環境を完全に把握してから行動する戦略家タイプです。
    </div>
  </div>
</div>

<div class="footer">
  © 2026 排泄行動性格分析研究所
</div>

<script>
function startTest() {
  document.getElementById("hero").style.display = "none";
  document.getElementById("questionSection").style.display = "block";
}

function analyze() {
  document.getElementById("questionSection").style.display = "none";
  document.getElementById("loadingSection").style.display = "block";

  setTimeout(function(){
    document.getElementById("loadingSection").style.display = "none";
    document.getElementById("resultSection").style.display = "block";
  }, 2500);
}
</script>

</body>
</html>
