<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排泄行動性格分析研究所</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  background:linear-gradient(180deg,#2a1a10,#4b2e1e,#1a0f0a);
  color:#fff;
  text-align:center;
}
header{ padding:40px 20px 10px; }
h1{ font-size:38px; font-weight:900; letter-spacing:4px; }
.container{ max-width:600px; margin:auto; padding:20px; }

button{
  width:100%;
  padding:18px;
  margin:10px 0;
  font-size:18px;
  font-weight:700;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#6b3e26;
  color:#fff;
  transition:0.2s;
}
button:hover{ background:#8a5436; }

.progress{
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin:20px 0;
}
.progress-bar{
  height:100%;
  width:0%;
  background:#c97a42;
  transition:0.3s;
}

#loading{ font-size:18px; line-height:1.8; }

.result-card{
  padding:30px;
  background:#2e1c13;
  border-radius:20px;
  margin-top:20px;
}

.type-name{
  font-size:28px;
  font-weight:900;
  margin-bottom:10px;
}

.metric{ margin:10px 0; text-align:left; }
.metric-bar{
  height:8px;
  background:#444;
  border-radius:10px;
  overflow:hidden;
}
.metric-fill{
  height:100%;
  background:#c97a42;
}

.share-btn{
  margin-top:20px;
  background:#a65d2d;
}
</style>
</head>

<body>

<header>
<h1>排泄行動性格分析研究所</h1>
</header>

<div class="container">

<div id="quiz">
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<h2 id="question"></h2>
<div id="answers"></div>
</div>

<div id="loading" style="display:none;"></div>

<div id="result" style="display:none;">
<div class="result-card" id="resultCard">
<div class="type-name" id="typeName"></div>
<p id="typeDesc"></p>
<p id="typeUnrelated"></p>
<p id="typeDark"></p>

<div class="metric">社会適応指数
<div class="metric-bar"><div class="metric-fill" id="m1"></div></div>
</div>

<div class="metric">内的独裁度
<div class="metric-bar"><div class="metric-fill" id="m2"></div></div>
</div>

<div class="metric">思考分岐回数
<div class="metric-bar"><div class="metric-fill" id="m3"></div></div>
</div>

<p id="compatibility"></p>
</div>

<button class="share-btn" onclick="shareResult()">結果を画像保存</button>
</div>

</div>

<script>

// ================= 質問（完全対応型） =================

const questions = [
{
  text:"個室に入った瞬間どうする？",
  options:[
    {text:"まず観察する",value:0},
    {text:"すぐ行動する",value:1},
    {text:"音環境を確認",value:2},
    {text:"配置を最適化",value:3}
  ]
},
{
  text:"トイレットペーパーの残量は？",
  options:[
    {text:"必ず確認する",value:0},
    {text:"気にしない",value:1},
    {text:"多めに確保",value:2},
    {text:"理論的に最小使用",value:3}
  ]
},
{
  text:"退出タイミングは？",
  options:[
    {text:"即退出",value:1},
    {text:"様子を見る",value:0},
    {text:"完璧な無音タイミング",value:2},
    {text:"堂々と出る",value:3}
  ]
},
{
  text:"並んでいたら？",
  options:[
    {text:"列を観察",value:0},
    {text:"他を探す",value:1},
    {text:"待ちながら分析",value:2},
    {text:"気にせず並ぶ",value:3}
  ]
},
{
  text:"音姫があったら？",
  options:[
    {text:"必ず使う",value:2},
    {text:"使わない",value:1},
    {text:"周囲で判断",value:0},
    {text:"実験的に使う",value:3}
  ]
}
];

let current=0;
let score=0;

// ================= 質問表示 =================

function loadQuestion(){
  const q=questions[current];
  document.getElementById("question").innerText=
  `質問 ${current+1} / ${questions.length}\n${q.text}`;

  const ans=document.getElementById("answers");
  ans.innerHTML="";

  q.options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.innerText=opt.text;
    btn.onclick=()=>next(opt.value);
    ans.appendChild(btn);
  });

  document.getElementById("progressBar").style.width=
  (current/questions.length)*100+"%";
}

function next(val){
  score+=val;
  current++;
  if(current<questions.length){
    loadQuestion();
  }else{
    showLoading();
  }
}

// ================= ローディング =================

function showLoading(){
  document.getElementById("quiz").style.display="none";
  const load=document.getElementById("loading");
  load.style.display="block";
  load.innerHTML="被験者の思考回路を再構築中...<br>逸脱傾向を測定...<br>人類データベースと照合中...";
  setTimeout(showResult,2500);
}

// ================= タイプ =================

const TYPES=[
{
name:"静寂観測型",
desc:"あなたは環境を観測してから動きます。それは遅さではなく構造理解です。",
un:"あなたはパン派です。しかも2分30秒で止めます。",
dark:"中学時代、一度は合理とは何かを考えました。",
m:[72,41,88],
worst:"爆速撤退型合理主義者"
},
{
name:"爆速撤退型合理主義者",
desc:"あなたは崩壊を察知する嗅覚が鋭い。撤退は最適化です。",
un:"集合写真では端に立ちます。",
dark:"既読をつけて30分放置します。",
m:[64,55,67],
worst:"静寂観測型"
}
];

// ================= 結果表示 =================

function showResult(){
  document.getElementById("loading").style.display="none";
  document.getElementById("result").style.display="block";

  const type=TYPES[score%TYPES.length];

  document.getElementById("typeName").innerText=type.name;
  document.getElementById("typeDesc").innerText=type.desc;
  document.getElementById("typeUnrelated").innerText=type.un;
  document.getElementById("typeDark").innerText=type.dark;
  document.getElementById("compatibility").innerText=
  "相性最悪タイプ："+type.worst;

  document.getElementById("m1").style.width=type.m[0]+"%";
  document.getElementById("m2").style.width=type.m[1]+"%";
  document.getElementById("m3").style.width=type.m[2]+"%";
}

// ================= 画像保存 =================

function shareResult(){
  html2canvas(document.querySelector("#resultCard")).then(canvas=>{
    const link=document.createElement("a");
    link.download="analysis.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

loadQuestion();

</script>

</body>
</html>
