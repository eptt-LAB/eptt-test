<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>排泄行動性格分析研究所</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}
.section{
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}
.hidden{display:none;}
.progress{
  margin-bottom:20px;
  opacity:0.7;
}
.bar{
  height:8px;
  background:#ffffff33;
  border-radius:10px;
  margin-top:10px;
}
.fill{
  height:8px;
  background:white;
  border-radius:10px;
  width:0%;
  transition:0.3s;
}
.question{
  font-size:24px;
  margin:40px 0;
}
.option{
  display:block;
  width:100%;
  margin:20px 0;
  padding:25px 30px;
  border-radius:20px;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:white;
  color:#1c1c1c;
  transition:0.25s;
}
.option:hover{
  transform:scale(1.02);
}
.result{
  background:white;
  color:#243b55;
  padding:50px;
  border-radius:20px;
}
.type{
  font-size:40px;
  font-weight:900;
}
</style>
</head>
<body>

<div class="section" id="quiz">
  <div class="progress">
    <div id="progressText"></div>
    <div class="bar"><div class="fill" id="progressFill"></div></div>
  </div>
  <div class="question" id="questionText"></div>
  <div id="options"></div>
</div>

<div class="section hidden" id="resultSection">
  <div class="result">
    <div class="type" id="typeText"></div>
    <div id="descText"></div>
  </div>
</div>

<script>

const questions = [
{
text:"個室に入った瞬間、最初にすることは？",
options:[
{text:"すぐ座る",type:"T"},
{text:"鍵を二回確認する",type:"S"},
{text:"スマホを取り出す",type:"C"},
{text:"便座の状態をチェック",type:"R"}
]},
{
text:"滞在時間の傾向は？",
options:[
{text:"最短で出る",type:"T"},
{text:"平均的",type:"R"},
{text:"わりと長い",type:"C"},
{text:"状況で変わる",type:"S"}
]},
{
text:"物音が聞こえたら？",
options:[
{text:"気にしない",type:"T"},
{text:"少し警戒する",type:"S"},
{text:"完全に動きを止める",type:"C"},
{text:"様子をうかがう",type:"R"}
]},
{
text:"列ができていたら？",
options:[
{text:"気にせず入る",type:"T"},
{text:"急いで出る",type:"A"},
{text:"プレッシャーを感じる",type:"E"},
{text:"冷静に処理する",type:"R"}
]},
{
text:"トラブル時の反応は？",
options:[
{text:"即対応",type:"T"},
{text:"原因分析",type:"R"},
{text:"焦る",type:"E"},
{text:"静観する",type:"S"}
]},
{
text:"普段の性格は？",
options:[
{text:"合理主義",type:"R"},
{text:"感情派",type:"E"},
{text:"慎重派",type:"S"},
{text:"即断型",type:"T"}
]},
{
text:"人間関係では？",
options:[
{text:"主導する",type:"A"},
{text:"合わせる",type:"P"},
{text:"観察する",type:"C"},
{text:"盛り上げる",type:"O"}
]},
{
text:"一人時間は？",
options:[
{text:"必須",type:"C"},
{text:"あれば嬉しい",type:"S"},
{text:"なくても平気",type:"O"},
{text:"基本不要",type:"A"}
]},
{
text:"決断の速さは？",
options:[
{text:"即決",type:"T"},
{text:"熟考型",type:"S"},
{text:"論理重視",type:"R"},
{text:"直感重視",type:"E"}
]},
{
text:"疲れたときは？",
options:[
{text:"黙る",type:"C"},
{text:"誰かと話す",type:"O"},
{text:"効率を考える",type:"R"},
{text:"衝動的になる",type:"E"}
]},
{
text:"空間へのこだわりは？",
options:[
{text:"ほぼない",type:"T"},
{text:"清潔さ重視",type:"S"},
{text:"快適性重視",type:"C"},
{text:"機能性重視",type:"R"}
]},
{
text:"プレッシャー下では？",
options:[
{text:"加速する",type:"T"},
{text:"慎重になる",type:"S"},
{text:"緊張する",type:"E"},
{text:"冷静分析",type:"R"}
]},
{
text:"あなたは？",
options:[
{text:"支配型",type:"A"},
{text:"調整型",type:"P"},
{text:"内省型",type:"C"},
{text:"外向型",type:"O"}
]},
{
text:"目標への姿勢は？",
options:[
{text:"一直線",type:"T"},
{text:"戦略的",type:"R"},
{text:"共感重視",type:"E"},
{text:"状況適応",type:"P"}
]},
{
text:"最も近いのは？",
options:[
{text:"即断実行",type:"T"},
{text:"戦略観察",type:"S"},
{text:"内省探求",type:"C"},
{text:"主導統率",type:"A"}
]}
];

let index=0;
let scores={T:0,S:0,R:0,E:0,A:0,P:0,C:0,O:0};

function showQuestion(){
document.getElementById("progressText").innerText=
`質問 ${index+1} / ${questions.length}`;
document.getElementById("progressFill").style.width=
((index)/questions.length)*100+"%";

const q=questions[index];
document.getElementById("questionText").innerText=q.text;

const optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach(opt=>{
const btn=document.createElement("button");
btn.className="option";
btn.innerText=opt.text;
btn.onclick=()=>answer(opt.type);
optionsDiv.appendChild(btn);
});
}

function answer(type){
scores[type]++;
index++;
if(index<questions.length){
showQuestion();
}else{
showResult();
}
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultSection").classList.remove("hidden");

const type=
(scores.T>=scores.S?"T":"S")+
(scores.R>=scores.E?"R":"E")+
(scores.A>=scores.P?"A":"P")+
(scores.C>=scores.O?"C":"O");

document.getElementById("typeText").innerText=type;
document.getElementById("descText").innerText=
"あなたは独自の個室戦略を持つ高度分析型タイプです。";
}

showQuestion();

</script>
</body>
</html>
