<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>排泄行動性格分析研究所</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}
.section{
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}
.hidden{display:none;}
.progress{
  margin-bottom:20px;
  opacity:0.6;
}
.bar{
  height:8px;
  background:#ffffff33;
  border-radius:10px;
  margin-top:10px;
}
.fill{
  height:8px;
  background:white;
  border-radius:10px;
  width:0%;
  transition:0.3s;
}
.question{
  font-size:24px;
  margin:40px 0;
}
.option{
  display:block;
  width:100%;
  margin:20px 0;
  padding:30px;
  border-radius:20px;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:white;
  color:#1c1c1c;
  transition:0.25s;
}
.option:hover{
  transform:scale(1.02);
}
.result{
  background:white;
  color:#243b55;
  padding:50px;
  border-radius:20px;
}
.type{
  font-size:40px;
  font-weight:900;
}
</style>
</head>
<body>

<div class="section" id="quiz">
  <div class="progress">
    <div id="progressText"></div>
    <div class="bar"><div class="fill" id="progressFill"></div></div>
  </div>
  <div class="question" id="questionText"></div>
  <div id="options"></div>
</div>

<div class="section hidden" id="resultSection">
  <div class="result">
    <div class="type" id="typeText"></div>
    <div id="descText"></div>
  </div>
</div>

<script>

const questions = [
  ["個室に入ったら？","T","S"],
  ["滞在時間は？","T","S"],
  ["物音がしたら？","S","T"],
  ["退出時は？","T","S"],
  ["列ができていたら？","S","T"],

  ["判断は？","R","E"],
  ["トラブル時は？","R","E"],
  ["焦ったら？","E","R"],
  ["説明するときは？","R","E"],

  ["あなたは？","A","P"],
  ["主導する？","A","P"],
  ["計画は？","P","A"],

  ["一人時間は？","C","O"],
  ["疲れたら？","C","O"],
  ["安心するのは？","O","C"]
];

let index = 0;
let scores = {T:0,S:0,R:0,E:0,A:0,P:0,C:0,O:0};

function showQuestion(){
  document.getElementById("progressText").innerText =
    `質問 ${index+1} / ${questions.length}`;

  document.getElementById("progressFill").style.width =
    ((index)/questions.length)*100 + "%";

  const q = questions[index];
  document.getElementById("questionText").innerText = q[0];

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML="";

  const btn1 = document.createElement("button");
  btn1.className="option";
  btn1.innerText="はい";
  btn1.onclick=()=>answer(q[1]);

  const btn2 = document.createElement("button");
  btn2.className="option";
  btn2.innerText="いいえ";
  btn2.onclick=()=>answer(q[2]);

  optionsDiv.appendChild(btn1);
  optionsDiv.appendChild(btn2);
}

function answer(type){
  scores[type]++;
  index++;
  if(index<questions.length){
    showQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("resultSection").classList.remove("hidden");

  const type =
    (scores.T>=scores.S?"T":"S")+
    (scores.R>=scores.E?"R":"E")+
    (scores.A>=scores.P?"A":"P")+
    (scores.C>=scores.O?"C":"O");

  document.getElementById("typeText").innerText=type;
  document.getElementById("descText").innerText=
    "あなたは独自の個室戦略を持つ分析型タイプです。";
}

showQuestion();

</script>

</body>
</html>
